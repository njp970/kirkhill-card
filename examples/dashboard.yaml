                icon_color: >-
                  {% set st = states('binary_sensor.turbine_t3_running') %}
                  {{ 'green' if st == 'on' else ('grey' if st == 'off' else 'amber') }}
                entity: binary_sensor.turbine_t3_running
                tap_action:
